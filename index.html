<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>menu me Foto</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(135deg, #1c1c1c, #2b2b2b);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      padding: 12px;
    }

    .book-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #book {
      width: min(1000px, 96vw);
      height: min(650px, 70vh);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
    }

    .page {
      background: #111;
      border: 1px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .page img {
      max-width: 92%;
      max-height: 92%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .cover {
      background: linear-gradient(135deg, #4b2e1f, #24160f);
      color: #f3d19c;
      font-size: clamp(20px, 3vw, 38px);
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
    }

    .blank {
      background: #111;
    }

    #prevBtn,
    #nextBtn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      color: #f3d19c;
      font-size: 30px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.25s ease;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #prevBtn:hover,
    #nextBtn:hover {
      background: #f3d19c;
      color: #111;
      transform: translateY(-50%) scale(1.08);
    }

    #prevBtn:active,
    #nextBtn:active {
      transform: translateY(-50%) scale(0.96);
    }

    #prevBtn {
      left: 10px;
    }

    #nextBtn {
      right: 10px;
    }

    /* Telefon */
    @media (max-width: 768px) {
      body {
        padding: 8px;
      }

      #book {
        width: 96vw;
        height: 62vh;
      }

      #prevBtn,
      #nextBtn {
        width: 42px;
        height: 42px;
        font-size: 22px;
      }

      #prevBtn {
        left: 4px;
      }

      #nextBtn {
        right: 4px;
      }

      .page img {
        max-width: 94%;
        max-height: 94%;
      }
    }

    /* Telefona shumë të vegjël */
    @media (max-width: 480px) {
      #book {
        width: 98vw;
        height: 58vh;
      }

      #prevBtn,
      #nextBtn {
        width: 38px;
        height: 38px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="book-wrapper">
    <button id="prevBtn" aria-label="Faqja para">‹</button>

    <div id="book">
      <div class="page cover">menu</div>

      <div class="page"><img src="img/1.jpg" alt="Foto 1"></div>
      <div class="page"><img src="img/2.jpg" alt="Foto 2"></div>
      <div class="page"><img src="img/3.jpg" alt="Foto 3"></div>
      <div class="page"><img src="img/4.jpg" alt="Foto 4"></div>
      <div class="page"><img src="img/5.jpg" alt="Foto 5"></div>
      <div class="page"><img src="img/6.jpg" alt="Foto 6"></div>
      <div class="page"><img src="img/7.jpg" alt="Foto 7"></div>
      <div class="page"><img src="img/8.jpg" alt="Foto 8"></div>
      <div class="page"><img src="img/9.jpg" alt="Foto 9"></div>
      <div class="page"><img src="img/10.jpg" alt="Foto 10"></div>
      <div class="page"><img src="img/11.jpg" alt="Foto 11"></div>
      <div class="page"><img src="img/12.jpg" alt="Foto 12"></div>
      <div class="page"><img src="img/13.jpg" alt="Foto 13"></div>
      <div class="page"><img src="img/14.jpg" alt="Foto 14"></div>
      <div class="page"><img src="img/15.jpg" alt="Foto 14"></div>


      <div class="page blank"></div>
    </div>

    <button id="nextBtn" aria-label="Faqja tjetër">›</button>
  </div>

  <script>
    function createBook() {
      const book = $('#book');

      if (book.data('turn')) {
        book.turn('destroy');
      }

      book.turn({
        width: book[0].clientWidth,
        height: book[0].clientHeight,
        autoCenter: true,
        display: 'double'
      });
    }

    $(document).ready(function() {
      createBook();

      $('#prevBtn').on('click', function() {
        $('#book').turn('previous');
      });

      $('#nextBtn').on('click', function() {
        $('#book').turn('next');
      });

      $(document).keydown(function(e) {
        if (e.keyCode === 37) {
          $('#book').turn('previous');
        } else if (e.keyCode === 39) {
          $('#book').turn('next');
        }
      });

      let resizeTimer;
      $(window).on('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          createBook();
        }, 250);
      });
    });
  </script>

</body>
</html>
